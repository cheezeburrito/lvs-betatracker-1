<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LVS Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060a10;
  --card:#111827;
  --border:#1f2d45;
  --accent:#3b82f6;
  --green:#22c55e;
  --amber:#f59e0b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --input-bg:#0a1020;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:18px; /* base size for mobile */
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.25rem;
  background:#0d1424;border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.hdr-title{font-size:1.3rem;font-weight:800;color:#fff;}
.hdr-sub{font-size:.8rem;color:var(--muted);margin-top:2px;}
.sync-row{display:flex;align-items:center;gap:.5rem;}
.sync-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);}
.sync-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
.sync-lbl{font-size:.8rem;color:var(--muted);}

/* ── SETUP ── */
#setup{
  padding:1.5rem 1.25rem;
  display:flex;flex-direction:column;gap:1.25rem;
  max-width:480px;margin:0 auto;
}
.lbl{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;font-weight:600;}
input,select{
  width:100%;
  background:var(--input-bg);
  border:2px solid var(--border);
  border-radius:12px;
  padding:1rem 1.1rem;
  color:var(--text);
  font-size:1.1rem;
  outline:none;
  appearance:none;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--accent);}
select option{background:#111827;}
.btn{
  width:100%;padding:1.1rem;
  border-radius:12px;border:none;
  font-size:1.1rem;font-weight:700;
  cursor:pointer;
  min-height:56px;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{filter:brightness(.85);}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--text);}
.btn-ghost:active{background:#1f2d45;}

/* ── SCAN SCREEN ── */
#scan-screen{display:none;flex-direction:column;height:calc(100dvh - 70px);}

.sess-strip{
  padding:.75rem 1.25rem;
  background:#0a1525;border-bottom:2px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.sess-name{font-size:1rem;font-weight:700;color:#fff;}
.sess-op{font-size:.8rem;color:var(--muted);}
.exit-btn{
  font-size:.85rem;color:var(--muted);
  background:transparent;border:1px solid var(--border);
  border-radius:8px;padding:.5rem .9rem;cursor:pointer;
  white-space:nowrap;min-height:44px;
}

.scan-zone{
  padding:1.25rem;
  flex:1;display:flex;flex-direction:column;gap:1rem;
  overflow:hidden;
}

/* The single scan input — clears after each scan, focus never lost */
.scan-field-wrap{position:relative;}
.scan-field-tip{font-size:.8rem;color:var(--muted);margin-bottom:.5rem;}
#scan-field{
  width:100%;
  background:var(--input-bg);
  border:3px solid var(--border);
  border-radius:14px;
  padding:1.1rem 1.25rem;
  color:var(--text);
  font-size:1.2rem;
  font-family:monospace;
  outline:none;
  letter-spacing:.05em;
  min-height:64px;
}
#scan-field:focus{border-color:var(--accent);}
#scan-field.flash{border-color:var(--green);background:#0a1f10;}

.counter-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.25rem;
}
.counter{font-size:2.5rem;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;}
.counter-meta{font-size:.8rem;color:var(--muted);margin-top:.25rem;}
.clear-btn{
  font-size:.85rem;color:var(--muted);
  background:transparent;border:1px solid var(--border);
  border-radius:8px;padding:.6rem 1rem;cursor:pointer;
  min-height:44px;
}

/* last scan display */
.last-scan{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.9rem 1.25rem;display:none;
  align-items:center;gap:.75rem;
}
.last-scan.show{display:flex;}
.ls-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.ls-val{font-size:1.05rem;font-family:monospace;font-weight:600;flex:1;}
.ls-lbl{font-size:.75rem;color:var(--muted);}

/* feed */
.feed-hdr{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.feed{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:.4rem;
  padding-bottom:.5rem;
  -webkit-overflow-scrolling:touch;
}
.fi{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem 1rem;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  animation:fi-in .12s ease;
}
@keyframes fi-in{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.fi-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.fi-dot.ok{background:var(--green);}
.fi-dot.warn{background:var(--amber);}
.fi-dot.dup{background:#60a5fa;}
.fi-val{flex:1;font-size:.95rem;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fi-time{font-size:.72rem;color:var(--muted);flex-shrink:0;}
.fi-del{font-size:1.1rem;color:var(--muted);cursor:pointer;padding:.1rem .4rem;border-radius:6px;flex-shrink:0;line-height:1;transition:color .15s,background .15s;}
.fi-del:hover{color:#f87171;background:rgba(248,113,113,.12);}

.empty-feed{
  text-align:center;color:var(--muted);
  padding:3rem 1rem;font-size:.95rem;line-height:1.8;
}
.empty-icon{font-size:3rem;margin-bottom:.75rem;}

/* toast */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:#1e293b;border:2px solid var(--border);
  border-radius:12px;padding:.85rem 1.5rem;
  font-size:.95rem;font-weight:600;
  white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:200;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">LVS Scanner</div>
    <div class="hdr-sub">Phase 1 · Real-time</div>
  </div>
  <div class="sync-row">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-lbl" id="syncLbl">offline</span>
  </div>
</div>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="lbl">Your name</div>
    <input id="opInput" type="text" placeholder="e.g. Oscar"
           autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
  </div>
  <div>
    <div class="lbl">Active Session</div>
    <select id="sessSelect">
      <option value="">Loading…</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="startScanning()">▶ Start Scanning</button>
  <button class="btn btn-ghost" onclick="refreshSessions()">↻ Refresh Sessions</button>
</div>

<!-- SCAN SCREEN -->
<div id="scan-screen">

  <div class="sess-strip">
    <div>
      <div class="sess-name" id="strip-name">—</div>
      <div class="sess-op" id="strip-op">—</div>
    </div>
    <button class="exit-btn" onclick="exitScanning()">✕ Exit</button>
  </div>

  <div class="scan-zone">

    <div class="scan-field-wrap">
      <div class="scan-field-tip">Tap below once, then scan — each barcode submits instantly</div>
      <!-- Single input — clears after every scan, focus held, no DOM flicker -->
      <input id="scan-field" type="text"
             placeholder="Ready to scan…"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" inputmode="none">
    </div>

    <!-- Last scan confirmation -->
    <div class="last-scan" id="last-scan">
      <div class="ls-dot" id="ls-dot"></div>
      <div>
        <div class="ls-val" id="ls-val">—</div>
        <div class="ls-lbl" id="ls-lbl">—</div>
      </div>
    </div>

    <div class="counter-row">
      <div>
        <div class="counter" id="scan-count">0</div>
        <div class="counter-meta">scans this session</div>
      </div>
      <button class="clear-btn" onclick="clearFeed()">Clear</button>
    </div>

    <div class="feed-hdr">Live feed</div>
    <div class="feed" id="feed">
      <div class="empty-feed">
        <div class="empty-icon">📡</div>
        Tap the scan field above<br>then point the gun and fire
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://wzwcfvmhnqwhmfjdcsxj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d2Nmdm1obnF3aG1mamRjc3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTc4MTksImV4cCI6MjA5NjU5MzgxOX0.4ABH_t8-DG9Sh-Ts293pJKvO4CsO8bCM1pqjt59G5Xc';
const sb = supabase.createClient(SB_URL, SB_KEY);

function norm(v){ return String(v||'').replace(/[^A-Z0-9]/gi,'').toUpperCase(); }

let activeSess    = null;
let seenThisRun   = new Set();
let scanCount     = 0;
let sessionsStore = {};

// ── SYNC ──────────────────────────────────────────────────────────────────
function setSynced(on){
  document.getElementById('syncDot').className = 'sync-dot'+(on?' live':'');
  document.getElementById('syncLbl').textContent = on?'live':'offline';
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ── SESSIONS ──────────────────────────────────────────────────────────────
async function refreshSessions(){
  const sel=document.getElementById('sessSelect');
  sel.innerHTML='<option value="">Loading…</option>';
  sessionsStore={};
  try{
    const{data,error}=await sb
      .from('shipments')
      .select('id,name,operator,manifest,completed,phase')
      .eq('phase','prescan')
      .eq('completed',false)
      .order('created_at',{ascending:false});
    if(error) throw error;
    setSynced(true);
    if(!data||!data.length){
      sel.innerHTML='<option value="">No active Phase 1 sessions</option>';
      return;
    }
    data.forEach(s=>sessionsStore[s.id]=s);
    sel.innerHTML='<option value="">— select session —</option>'+
      data.map(s=>`<option value="${s.id}">${s.name}${s.operator?' · '+s.operator:''}</option>`).join('');
    if(data.length===1) sel.value=data[0].id;
  }catch(e){
    sel.innerHTML='<option value="">Error — tap Refresh</option>';
    setSynced(false);
    console.warn(e);
  }
}

// ── START ──────────────────────────────────────────────────────────────────
function startScanning(){
  const op=document.getElementById('opInput').value.trim();
  const sel=document.getElementById('sessSelect');
  if(!op){toast('Enter your name first');return;}
  if(!sel.value){toast('Select a session first');return;}

  const row=sessionsStore[sel.value]||{};
  const manifest=row.manifest||{};
  const allT=Object.values(manifest).flat().map(r=>norm(r.tracking||r.ccn||'')).filter(Boolean);

  activeSess={id:sel.value, name:row.name||sel.value, operator:op, normedTracking:new Set(allT)};
  localStorage.setItem('scanner_op',op);

  document.getElementById('strip-name').textContent=activeSess.name;
  document.getElementById('strip-op').textContent='Operator: '+op;
  document.getElementById('setup').style.display='none';
  document.getElementById('scan-screen').style.display='flex';

  seenThisRun.clear(); scanCount=0;
  document.getElementById('scan-count').textContent='0';
  document.getElementById('last-scan').className='last-scan';
  document.getElementById('feed').innerHTML=
    '<div class="empty-feed"><div class="empty-icon">📡</div>Tap the scan field above<br>then point the gun and fire</div>';

  const f=document.getElementById('scan-field');
  f.value='';
  f.focus();
}

function exitScanning(){
  activeSess=null;
  document.getElementById('scan-screen').style.display='none';
  document.getElementById('setup').style.display='flex';
  document.getElementById('scan-field').value='';
  refreshSessions();
}

// ── SCAN INPUT ─────────────────────────────────────────────────────────────
// Primary method: keydown Enter (keyboard-wedge fires Enter after barcode)
document.getElementById('scan-field').addEventListener('keydown',function(e){
  if(e.key==='Enter'||e.keyCode===13){
    e.preventDefault();
    const val=this.value.trim();
    if(val){
      handleScan(val);
      this.value=''; // clear immediately — focus stays, ready for next scan
    }
  }
});

// Fallback: some scanner configs emit the barcode as a paste or rapid input
// ending with \n — catch that too
document.getElementById('scan-field').addEventListener('input',function(){
  const val=this.value;
  // If the value contains a newline the scanner appended Enter mid-paste
  if(val.includes('\n')||val.includes('\r')){
    const parts=val.split(/[\r\n]+/).map(s=>s.trim()).filter(Boolean);
    parts.forEach(p=>handleScan(p));
    this.value='';
  }
});

// Keep focus if user taps anywhere in the scan zone (not a button)
document.getElementById('scan-screen').addEventListener('pointerdown',function(e){
  if(!e.target.closest('button')){
    setTimeout(()=>document.getElementById('scan-field').focus(),0);
  }
});

// ── HANDLE SCAN ────────────────────────────────────────────────────────────
async function handleScan(raw){
  if(!activeSess)return;
  const normed=norm(raw);
  if(!normed)return;

  const isDup=seenThisRun.has(normed);
  const inManifest=!activeSess.normedTracking.size||activeSess.normedTracking.has(normed);
  seenThisRun.add(normed);
  scanCount++;
  document.getElementById('scan-count').textContent=scanCount;

  // Flash field
  const f=document.getElementById('scan-field');
  f.classList.add('flash');
  setTimeout(()=>f.classList.remove('flash'),200);

  // Last scan strip
  const ls=document.getElementById('last-scan');
  const lsDot=document.getElementById('ls-dot');
  const lsVal=document.getElementById('ls-val');
  const lsLbl=document.getElementById('ls-lbl');
  ls.className='last-scan show';
  lsDot.className='ls-dot '+(isDup?'dup':inManifest?'ok':'warn');
  lsVal.textContent=normed;
  lsLbl.textContent=isDup?'Duplicate — already scanned':inManifest?'✓ Matched in manifest':'⚠ Not found in manifest';

  // Add to feed immediately, then attach UUID when insert resolves
  const feedEl=addFeedItem(normed,isDup,inManifest);

  // Push to Supabase — capture UUID for per-item delete
  sb.from('scans').insert({
    shipment_id:activeSess.id,
    tracking:normed,
    device:activeSess.operator,
    scanned_at:new Date().toISOString()
  }).select('id').single().then(({data,error})=>{
    if(error){console.warn('push:',error);return;}
    if(data?.id&&feedEl) feedEl.dataset.id=data.id;
  });
}

// ── FEED ───────────────────────────────────────────────────────────────────
function addFeedItem(normed,isDup,inManifest){
  const feed=document.getElementById('feed');
  const empty=feed.querySelector('.empty-feed');
  if(empty)empty.remove();

  const now=new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const dotCls=isDup?'dup':inManifest?'ok':'warn';

  const el=document.createElement('div');
  el.className='fi';
  el.innerHTML=`<div class="fi-dot ${dotCls}"></div><div class="fi-val">${normed}</div><div class="fi-time">${now}</div><div class="fi-del" title="Remove scan">×</div>`;
  el.querySelector('.fi-del').addEventListener('click',()=>deleteScanItem(el,normed));
  feed.insertBefore(el,feed.firstChild);
  while(feed.children.length>120)feed.removeChild(feed.lastChild);
  return el;
}

function deleteScanItem(el,normed){
  const id=el.dataset.id;
  el.remove();
  seenThisRun.delete(normed);
  scanCount=Math.max(0,scanCount-1);
  document.getElementById('scan-count').textContent=scanCount;
  if(id) sb.from('scans').delete().eq('id',id).then(({error})=>{if(error)console.warn('del:',error);});
}

function clearFeed(){
  seenThisRun.clear(); scanCount=0;
  document.getElementById('scan-count').textContent='0';
  document.getElementById('last-scan').className='last-scan';
  document.getElementById('feed').innerHTML=
    '<div class="empty-feed"><div class="empty-icon">📡</div>Tap the scan field above<br>then point the gun and fire</div>';
  document.getElementById('scan-field').value='';
  document.getElementById('scan-field').focus();
  // Delete all scans for this session from Supabase
  if(activeSess) sb.from('scans').delete().eq('shipment_id',activeSess.id).then(({error})=>{if(error)console.warn('clear:',error);});
}

// ── INIT ───────────────────────────────────────────────────────────────────
(async function(){
  const saved=localStorage.getItem('scanner_op');
  if(saved)document.getElementById('opInput').value=saved;
  await refreshSessions();
})();
</script>
</body>
</html>
